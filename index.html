<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System - Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <div class="logo">📚</div>
                <div class="brand-text">
                    <h1>LibraryHub</h1>
                    <p>Management System</p>
                </div>
            </div>
            <div class="navbar-actions">
                <button class="nav-btn active">Dashboard</button>
                <button class="nav-btn">Reports</button>
                <button class="nav-btn">Settings</button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <h2>Admin Dashboard</h2>
            <p>Manage your library collection efficiently</p>
        </div>

        <!-- Statistics Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div>
                        <div class="stat-value" id="totalBooks">0</div>
                        <div class="stat-label">Total Books</div>
                    </div>
                    <div class="stat-icon primary">📚</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div>
                        <div class="stat-value" id="availableBooks">0</div>
                        <div class="stat-label">Available</div>
                    </div>
                    <div class="stat-icon success">✓</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div>
                        <div class="stat-value" id="issuedBooks">0</div>
                        <div class="stat-label">Issued</div>
                    </div>
                    <div class="stat-icon warning">⚡</div>
                </div>
            </div>
        </div>

        <!-- Add Book Section -->
        <div class="add-book-section">
            <div class="section-title">
                <div class="section-icon">+</div>
                <h3>Add New Book</h3>
            </div>
            <form id="addBookForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="bookId">Book ID</label>
                        <input type="number" id="bookId" placeholder="Enter unique book ID" required>
                    </div>
                    <div class="form-group">
                        <label for="title">Book Title</label>
                        <input type="text" id="title" placeholder="Enter book title" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="author">Author Name</label>
                        <input type="text" id="author" placeholder="Enter author name" required>
                    </div>
                    <div class="form-group form-submit">
                        <button type="submit" class="btn btn-primary">Add Book to Library</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Books Section -->
        <div class="books-section">
            <div class="section-header">
                <div class="section-title">
                    <div class="section-icon">📖</div>
                    <h3>Library Collection</h3>
                </div>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">All Books</button>
                    <button class="filter-tab" data-filter="available">Available</button>
                    <button class="filter-tab" data-filter="issued">Issued</button>
                </div>
            </div>

            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search by title, author, or ID...">
            </div>

            <div id="booksContainer" class="books-grid"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>

</html>
